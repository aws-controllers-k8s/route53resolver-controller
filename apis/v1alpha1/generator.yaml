ignore:
  resource_names:
      - OutpostResolver
      - FirewallDomainList
      - FirewallRule
      - FirewallRuleGroup
      #- ResolverEndpoint
      #- ResolverQueryLogConfig
      #- ResolverRule
  field_paths:
    - CreateResolverEndpointInput.CreatorRequestId
    - CreateResolverEndpointInput.OutpostArn
    - CreateResolverEndpointInput.PreferredInstanceType
    - CreateResolverEndpointInput.Protocols
    - CreateResolverEndpointOutput.ResolverEndpoint.OutpostArn
    - CreateResolverEndpointOutput.ResolverEndpoint.PreferredInstanceType
    - CreateResolverEndpointOutput.ResolverEndpoint.Protocols
    - CreateResolverRuleInput.CreatorRequestId
    - CreateResolverQueryLogConfigOutput.ResolverQueryLogConfig.CreatorRequestId
    - GetResolverQueryLogConfigOutput.ResolverQueryLogConfig.CreatorRequestId
    - TargetAddress.ServerNameIndication
    - TargetAddress.Protocol
prefix_config: {}
operations:
  CreateResolverEndpoint:
    output_wrapper_field_path: ResolverEndpoint
  CreateResolverRule:
    output_wrapper_field_path: ResolverRule
  AssociateResolverQueryLogConfig:
    operation_type: Create
    resource_name: ResolverQueryLogConfigAssociation
  GetResolverQueryLogConfigAssociation:
    resource_name: ResolverQueryLogConfigAssociation
  DisassociateResolverQueryLogConfig:
    operation_type: Delete
    resource_name: ResolverQueryLogConfigAssociation
  AssociateResolverRule:
    resource_name: ResolverRuleAssociation
    operation_type: Create
    output_wrapper_field_path: ResolverRuleAssociation
  DisassociateResolverRule:
    resource_name: ResolverRuleAssociation
    operation_type: Delete
    output_wrapper_field_path: ResolverRuleAssociation
  GetResolverRuleAssociation:
    resource_name: ResolverRuleAssociation
    operation_type: Read_One
    output_wrapper_field_path: ResolverRuleAssociation
resources:
  ResolverEndpoint:
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
    fields:
      Id:
        is_primary_key: true
        print:
          name: ID
      SecurityGroupIds:
        references:
          resource: SecurityGroup
          service_name: ec2
          path: Status.ID
      IPAddresses.SubnetID:
        references:
          resource: Subnet
          service_name: ec2
          path: Status.SubnetID
      IPAddresses:
        is_read_only: true
        custom_field:
          list_of: IpAddressResponse
    renames:
      operations:
        GetResolverEndpoint:
          input_fields:
            ResolverEndpointId: Id
        UpdateResolverEndpoint:
          input_fields:
            ResolverEndpointId: Id
        DeleteResolverEndpoint:
          input_fields:
            ResolverEndpointId: Id
    hooks:
      sdk_create_post_build_request:
        template_path: hooks/resolver_endpoint/sdk_create_post_build_request.go.tpl
      sdk_create_post_set_output:
        template_path: hooks/resolver_endpoint/sdk_create_post_set_output.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/resolver_endpoint/sdk_read_one_post_set_output.go.tpl
      sdk_update_post_set_output:
        template_path: hooks/resolver_endpoint/sdk_update_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/resolver_endpoint/sdk_update_pre_build_request.go.tpl
  ResolverRule:
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
    fields:
      Id:
        is_primary_key: true
        print:
          name: ID
      Associations:
        custom_field:
          list_of: ResolverRuleAssociation
    renames:
      operations:
        GetResolverRule:
          input_fields:
            ResolverRuleId: Id
        UpdateResolverRule:
          input_fields:
            ResolverRuleId: Id
        DeleteResolverRule:
          input_fields:
            ResolverRuleId: Id
    hooks:
      sdk_create_post_build_request:
        template_path: hooks/resolver_rule/sdk_create_post_build_request.go.tpl
      sdk_create_post_set_output:
        template_path: hooks/resolver_rule/sdk_create_post_set_output.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/resolver_rule/sdk_read_many_post_set_output.go.tpl
      sdk_delete_pre_build_request:
        template_path: hooks/resolver_rule/sdk_delete_pre_build_request.go.tpl
    update_operation:
      custom_method_name: customUpdateResolverRule
  ResolverRuleAssociation:
    synced:
      when:
        - path: Status.Status
          in:
            - COMPLETE
    tags:
      ignore: true
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
    fields:
      Id:
        is_primary_key: true
        print:
          name: ID
      ResolverRuleId:
        is_immutable: true
        is_required: true
        references:
          resource: ResolverRule
          path: Status.ID
      VPCId:
        is_immutable: true
        is_required: true
        references:
          resource: VPC
          path: Status.VPCID
          service_name: ec2
      Name:
        is_immutable: true
    renames:
      operations:
        GetResolverRuleAssociation:
          input_fields:
            ResolverRuleAssociationId: Id
  ResolverQueryLogConfig:
    ignore_idempotency_token: true
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterException
        - InvalidRequestException
    fields:
      Id:
        is_primary_key: true
        print:
          name: ID
      Name:
        is_immutable: true
      DestinationArn:
        is_immutable: true
    renames:
      operations:
        GetResolverQueryLogConfig:
          input_fields:
            ResolverQueryLogConfigId: Id
        DeleteResolverQueryLogConfig:
          input_fields:
            ResolverQueryLogConfigId: Id
    synced:
      when:
        - path: Status.Status
          in:
            - CREATED
    update_operation:
      custom_method_name: customUpdateResolverQueryLogConfig
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/resolver_query_log_config/sdk_read_one_post_set_output.go.tpl
  ResolverQueryLogConfigAssociation:
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterException
        - InvalidRequestException
    fields:
      Id:
        is_primary_key: true
        print:
          name: ID
      ResolverQueryLogConfigId:
        is_immutable: true
        references:
          resource: ResolverQueryLogConfig
          path: Status.ID
      ResourceId:
        is_immutable: true
        references:
          resource: VPC
          path: Status.VPCID
          service_name: ec2
    renames:
      operations:
        GetResolverQueryLogConfigAssociation:
          input_fields:
            ResolverQueryLogConfigAssociationId: Id
    synced:
      when:
        - path: Status.Status
          in:
            - ACTIVE
    tags:
      ignore: true
